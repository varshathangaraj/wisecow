apiVersion: v1
kind: Service
metadata:
  name: wisecow-service
  namespace: wisecow
  labels:
    app: wisecow
spec:
  selector:
    app: wisecow
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 4499
    # Uncomment below for HTTPS / TLS
    # - name: https
    #   protocol: TCP
    #   port: 443
    #   targetPort: 4499
  # Use LoadBalancer for cloud environments; NodePort for local/minikube
  type: LoadBalancer
