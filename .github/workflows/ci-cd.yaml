name: CI/CD – Build, Push & Deploy Wisecow

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/wisecow

jobs:
  # ──────────────────────────────────────────────────────
  # Job 1: Build and push Docker image
  # ──────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch support)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image build summary
        run: |
          echo "## Docker Image Built 🐳" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────
  # Job 2: Deploy to Kubernetes (Challenge Goal)
  # Runs only on push to main (not on PRs)
  # ──────────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Set image tag from SHA
        id: image
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Apply Kubernetes manifests (namespace & service)
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/service.yaml

      - name: Update deployment image
        run: |
          kubectl set image deployment/wisecow-deployment \
            wisecow=${{ steps.image.outputs.tag }} \
            -n wisecow

      - name: Apply full deployment manifest
        run: |
          # Replace image placeholder with actual tagged image
          sed -i "s|ghcr.io/YOUR_GITHUB_USERNAME/wisecow:latest|${{ steps.image.outputs.tag }}|g" \
            k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml -n wisecow

      - name: Apply Ingress (TLS)
        run: |
          kubectl apply -f k8s/cluster-issuer.yaml || true
          kubectl apply -f k8s/ingress.yaml -n wisecow

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/wisecow-deployment \
            -n wisecow \
            --timeout=120s

      - name: Verify deployment
        run: |
          echo "## Deployment Status 🚀" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n wisecow >> $GITHUB_STEP_SUMMARY
          kubectl get svc -n wisecow >> $GITHUB_STEP_SUMMARY

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed – rolling back..."
          kubectl rollout undo deployment/wisecow-deployment -n wisecow
